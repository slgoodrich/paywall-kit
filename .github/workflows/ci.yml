name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        # The runner image pre-installs these at stale versions with an
        # outdated formula index. `brew update` refreshes the index so the
        # upgrade actually pulls the current release (needed for current
        # SwiftFormat rule names).
        run: |
          brew update
          brew install swiftlint swiftformat
          brew upgrade swiftlint swiftformat
      - name: Tool versions
        run: |
          swiftformat --version
          swiftlint version
      - name: SwiftFormat (lint)
        run: swiftformat --lint .
      - name: SwiftLint (strict)
        run: swiftlint lint --strict
